<!DOCTYPE html>
<html lang="mn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Захиалгын түүх - Номин Транс</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#3B82F6",
            "primary-dark": "#2563EB",
            "success": "#10B981",
            "warning": "#F59E0B",
            "info": "#3B82F6",
            "surface": "#F0F4FF",
            "on-surface": "#0F172A",
          },
          fontFamily: {
             "body": ["Inter", "system-ui", "sans-serif"],
          },
          boxShadow: {
            "card": "0 1px 3px rgba(15, 23, 42, 0.04), 0 4px 12px rgba(15, 23, 42, 0.04)",
          }
        },
      },
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #F0F4FF; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1; }
    .header-blur { background: linear-gradient(180deg, rgba(240, 244, 255, 0.97) 0%, rgba(240, 244, 255, 0.92) 100%); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .delay-100 { animation-delay: 0.1s; opacity: 0; }
    .delay-200 { animation-delay: 0.2s; opacity: 0; }
  </style>
  <link rel="stylesheet" href="styles.css">
  <script>
    if (document.fonts) {
      document.fonts.ready.then(() => { document.documentElement.classList.add('fonts-loaded'); });
    } else {
      window.addEventListener('load', () => { document.documentElement.classList.add('fonts-loaded'); });
    }
  </script>
</head>

<body class="bg-[#F0F4FF] text-[#0F172A] min-h-screen pb-10">
  <header class="fixed top-0 w-full z-50 header-blur border-b border-blue-100/50">
    <div class="flex items-center justify-between px-4 py-3.5 max-w-lg mx-auto">
      <a href="profile" class="w-10 h-10 flex items-center justify-center -ml-2 rounded-full active:bg-blue-50 transition-colors shrink-0">
        <span class="material-symbols-outlined text-[24px]">arrow_back</span>
      </a>
      <h1 class="text-[17px] font-bold tracking-tight text-center absolute left-1/2 -translate-x-1/2 whitespace-nowrap">Захиалгын түүх</h1>
      <div class="w-10 shrink-0"></div>
    </div>
  </header>

  <main class="pt-[76px] px-4 max-w-lg mx-auto space-y-5" id="ordersContainer">
     <!-- Loading State -->
     <div id="loadingState" class="py-12 text-center text-slate-400">
       <span class="material-symbols-outlined animate-spin text-[40px] mb-2 text-primary">progress_activity</span>
       <p class="text-[14px] font-medium">Мэдээллийг татаж байна...</p>
     </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", async function() {
      const container = document.getElementById('ordersContainer');
      const loadingState = document.getElementById('loadingState');
      
      let orders = [];
      let emailQuery = '?user_email=none';
      const userStr = localStorage.getItem('nomin_user');
      if (userStr) {
        try {
          const user = JSON.parse(userStr);
          if (user.email) {
            emailQuery = `?user_email=${encodeURIComponent(user.email)}`;
          }
        } catch(e) {
          console.error("Error parsing user data:", e);
        }
      }

      try {
        const res = await fetch('/api/orders' + emailQuery);
        if (res.ok) {
           orders = await res.json();
        }
      } catch(e) {
        console.error(e);
      }

      loadingState.remove();

      if (orders.length === 0) {
        container.innerHTML += `
          <div class="bg-white rounded-3xl p-8 border border-blue-100/50 shadow-card animate-fade-in-up text-center mt-4">
            <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-slate-300">
              <span class="material-symbols-outlined text-[32px]">history</span>
            </div>
            <h3 class="text-[16px] font-bold text-gray-900 mb-2">Захиалгын түүх хоосон байна</h3>
            <p class="text-[13px] text-slate-500 mb-6 leading-relaxed">Та одоогоор ямар нэгэн захиалга өгөөгүй байна. Шинэ захиалга өгч Номин Транс-н үйлчилгээг туршаад үзээрэй.</p>
            <a href="order" class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white text-[13px] font-bold rounded-xl shadow-sm hover:bg-blue-600 transition-colors">
              Захиалга өгөх
            </a>
          </div>
        `;
        return;
      }

      let html = '';
      orders.forEach((order, index) => {
         const typeLabel = order.type === 'standard' ? 'Энгийн ачаа' : 'Экспресс ачаа';
         
         const d = new Date(order.date);
         const dateString = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
         
         // Status Mapping
         let statusLabel = 'Шалгаж байна';
         let statusColor = 'text-warning';
         let statusBg = 'bg-warning/10';
         if (order.status === 'picking_up') {
            statusLabel = 'Хаягаар очиж байна';
            statusColor = 'text-info';
            statusBg = 'bg-info/10';
         } else if (order.status === 'loaded') {
            statusLabel = 'Контейнерт ачигдлаа';
            statusColor = 'text-info';
            statusBg = 'bg-info/10';
         } else if (order.status === 'departed') {
            statusLabel = 'Пусанаас хөдөлсөн';
            statusColor = 'text-info';
            statusBg = 'bg-info/10';
         } else if (order.status === 'in_transit') {
            statusLabel = 'Зам-Үүдэд ирсэн';
            statusColor = 'text-info';
            statusBg = 'bg-info/10';
         } else if (order.status === 'arrived') {
            statusLabel = 'Монголд ачаа буусан';
            statusColor = 'text-primary';
            statusBg = 'bg-primary/10';
         } else if (order.status === 'delivered') {
            statusLabel = 'Хүргэгдсэн';
            statusColor = 'text-success';
            statusBg = 'bg-success/10';
         }

         // Images HTML
         let imagesHtml = '';
         if (order.images && order.images.length > 0) {
            let parsedImages = order.images;
            if (typeof order.images === 'string') {
               try { parsedImages = JSON.parse(order.images); } catch(e) { parsedImages = []; }
            }
            if (parsedImages.length > 0) {
               imagesHtml = `
                 <div class="pt-2">
                   <span class="text-[12px] text-slate-500 font-medium block mb-2">Барааны зураг</span>
                   <div class="flex gap-2.5 overflow-x-auto pb-1">
                     ${parsedImages.map(img => `<div class="w-16 h-16 bg-white rounded-xl bg-cover bg-center border border-slate-200 shadow-sm shrink-0" style="background-image: url('${img}');"></div>`).join('')}
                   </div>
                 </div>
               `;
            }
         }

         html += `
         <div class="animate-fade-in-up" style="animation-delay: ${index * 0.08}s; opacity: 0; animation-fill-mode: forwards;">
           
           <!-- Order Header Card -->
           <div class="bg-white rounded-t-3xl px-5 pt-5 pb-4 border border-blue-100/50 border-b-0 shadow-card">
             <div class="flex justify-between items-start mb-1">
               <h3 class="text-[20px] font-extrabold text-gray-900 tracking-tight">${order.order_id}</h3>
               <span class="text-[11px] font-bold ${statusColor} ${statusBg} px-2.5 py-1 rounded-lg whitespace-nowrap">${statusLabel}</span>
             </div>
             <p class="text-[12px] text-slate-400 font-medium tracking-wide">${dateString}</p>
           </div>

           <!-- Order Detail Card -->
           <div class="bg-white rounded-b-3xl px-5 pb-5 border border-blue-100/50 border-t-0 shadow-card space-y-5">
             
             <!-- Type & Branch -->
             <div class="flex justify-between items-center border-b border-slate-100 pb-4 pt-2">
               <p class="text-[13px] text-slate-400 font-medium tracking-wide">Төрөл</p>
               <div class="bg-primary/10 px-2.5 py-1 rounded-lg">
                  <p class="text-[13px] font-bold text-primary">${typeLabel}</p>
               </div>
             </div>

             <div class="flex justify-between items-center border-b border-slate-100 pb-4">
               <p class="text-[13px] text-slate-400 font-medium tracking-wide">Бүртгэсэн огноо</p>
               <p class="text-[14px] font-bold text-gray-900">${dateString}</p>
             </div>

             <div class="flex justify-between items-center border-b border-slate-100 pb-4">
               <p class="text-[13px] text-slate-400 font-medium tracking-wide">Салбар</p>
               <p class="text-[14px] font-bold text-primary flex items-center gap-1">
                  <span class="material-symbols-outlined text-[16px]">storefront</span>
                  ${order.branch || 'Тодорхойгүй'}
               </p>
             </div>

             <!-- Sender Info -->
             <div class="border-b border-slate-100 pb-4">
               <p class="text-[15px] font-bold text-gray-900 mb-3 flex items-center gap-2">
                 <span class="material-symbols-outlined text-primary text-[20px] bg-primary/10 rounded-full p-1">person</span>
                 Илгээгчийн мэдээлэл
               </p>
               <div class="bg-surface p-4 rounded-2xl border border-blue-100/50 space-y-3">
                  <div class="flex justify-between items-start">
                    <span class="text-[12px] text-slate-500 font-medium">Нэр</span>
                    <span class="text-[14px] font-bold text-gray-900">${order.sender_name || ''}</span>
                  </div>
                  <div class="flex justify-between items-start">
                    <span class="text-[12px] text-slate-500 font-medium">Утасны дугаар</span>
                    <span class="text-[14px] font-bold text-gray-900 tracking-wide">${order.sender_phone || ''}</span>
                  </div>
                  <div>
                    <span class="text-[12px] text-slate-500 font-medium block mb-1">Хаяг (Солонгос дахь хаяг)</span>
                    <span class="text-[14px] font-semibold text-gray-800 leading-relaxed block">${order.sender_address || ''}</span>
                  </div>
               </div>
             </div>

             <!-- Item Info -->
             <div class="border-b border-slate-100 pb-4">
               <p class="text-[15px] font-bold text-gray-900 mb-3 flex items-center gap-2">
                 <span class="material-symbols-outlined text-primary text-[20px] bg-primary/10 rounded-full p-1">package</span>
                 Барааны мэдээлэл
               </p>
               <div class="bg-surface p-4 rounded-2xl border border-blue-100/50 space-y-3">
                  <div class="flex justify-between items-start">
                    <span class="text-[12px] text-slate-500 font-medium">Барааны төрөл</span>
                    <span class="text-[14px] font-bold text-gray-900">${order.item_category || ''}</span>
                  </div>
                  <div class="flex justify-between items-start">
                    <span class="text-[12px] text-slate-500 font-medium">Барааны тоо ширхэг</span>
                    <span class="text-[14px] font-bold text-primary px-2 py-0.5 bg-primary/10 rounded-md">${order.item_quantity || ''} ш</span>
                  </div>
                   ${(() => { try { const li = JSON.parse(order.large_items || '[]'); return li.length > 0 ? `<div class="flex justify-between items-start"><span class="text-[12px] text-slate-500 font-medium">Том оврын ачаа</span><div class="flex flex-wrap gap-1 justify-end max-w-[60%]">${li.map(x => `<span class="text-[11px] font-bold text-orange-700 bg-orange-50 border border-orange-200 px-2 py-0.5 rounded-md">${x}</span>`).join('')}</div></div>` : ''; } catch(e) { return ''; } })()}
                  ${order.weight ? `<div class="flex justify-between items-start"><span class="text-[12px] text-slate-500 font-medium">Барааны жин</span><span class="text-[14px] font-bold text-gray-900">${order.weight} кг</span></div>
                   ${(() => { try { const vi = JSON.parse(order.volume_items || '[]'); if (vi.length === 0) return ''; return '<div class="mt-2 pt-2 border-t border-slate-100"><p class="text-[11px] text-slate-400 font-bold mb-1.5">Овор ихтэй ачаа:</p>' + vi.map(v => '<div class="flex justify-between items-center py-1"><span class="text-[12px] text-orange-700 font-medium">• ' + v.name + '</span><span class="text-[13px] font-bold text-orange-600">' + parseInt(v.price).toLocaleString() + ' ₩</span></div>').join('') + '</div>'; } catch(e) { return ''; } })()}` : ''}
                  ${imagesHtml}
               </div>
             </div>

             <!-- Receiver Info -->
             <div>
               <p class="text-[15px] font-bold text-gray-900 mb-3 flex items-center gap-2">
                 <span class="material-symbols-outlined text-primary text-[20px] bg-primary/10 rounded-full p-1">location_on</span>
                 Хүлээн авагчийн мэдээлэл
               </p>
               <div class="bg-surface p-4 rounded-2xl border border-blue-100/50 space-y-3">
                  <div class="flex justify-between items-start">
                    <span class="text-[12px] text-slate-500 font-medium">Нэр</span>
                    <span class="text-[14px] font-bold text-gray-900">${order.receiver_name || ''}</span>
                  </div>
                  <div class="flex justify-between items-start">
                    <span class="text-[12px] text-slate-500 font-medium">Утасны дугаар</span>
                    <span class="text-[14px] font-bold text-gray-900 tracking-wide">${order.receiver_phone || ''}</span>
                  </div>
                  <div>
                    <span class="text-[12px] text-slate-500 font-medium block mb-1">Хаяг (Монгол хаяг)</span>
                    <span class="text-[14px] font-semibold text-gray-800 leading-relaxed block">${order.receiver_address || ''}</span>
                  </div>
               </div>
             </div>

           </div>
         </div>
         `;
       });
       container.innerHTML += html;
    });
  </script>
</body>
</html>
