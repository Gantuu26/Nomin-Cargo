<!DOCTYPE html>
<html lang="mn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Захиалгын дэлгэрэнгүй - Админ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#3B82F6",
            "primary-dark": "#2563EB",
            "success": "#10B981",
            "warning": "#F59E0B",
            "info": "#3B82F6",
            "surface": "#F0F4FF",
            "on-surface": "#0F172A",
          },
          fontFamily: {
            "body": ["Inter", "system-ui", "sans-serif"],
          },
          boxShadow: {
            "card": "0 1px 3px rgba(15, 23, 42, 0.04), 0 4px 12px rgba(15, 23, 42, 0.04)",
            "nav": "0 -1px 12px rgba(15, 23, 42, 0.06)",
            "btn": "0 4px 14px rgba(59, 130, 246, 0.35)",
          }
        },
      },
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #F0F4FF; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .header-blur { background: linear-gradient(180deg, rgba(240, 244, 255, 0.97) 0%, rgba(240, 244, 255, 0.92) 100%); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .animate-fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .delay-100 { animation-delay: 0.1s; opacity: 0; }
    .delay-200 { animation-delay: 0.2s; opacity: 0; }
  </style>
  <link rel="stylesheet" href="styles.css">
  <script>
    if (!localStorage.getItem('admin_session')) {
      window.location.href = 'admin-login';
    }
    function logoutAdmin(e) {
      if(e) e.preventDefault();
      localStorage.removeItem('admin_session');
      window.location.href = 'admin-login';
    }
    document.fonts.ready.then(() => {
      document.documentElement.classList.add('fonts-loaded');
    });
  </script>
</head>

<body class="bg-[#F0F4FF] text-[#0F172A] min-h-screen pb-24">
  
  <!-- Admin Header -->
  <header class="fixed top-0 left-0 w-full lg:w-[calc(100%-260px)] lg:ml-[260px] z-50 bg-white/90 backdrop-blur-md border-b border-slate-100">
    <div class="flex items-center justify-between px-5 py-3 lg:px-8 mx-auto h-16">
      <div class="flex items-center gap-3">
        <a href="admin-orders" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-600 transition-colors bg-white shadow-sm border border-slate-100">
          <span class="material-symbols-outlined text-[20px] ml-0.5">arrow_back_ios_new</span>
        </a>
        <h1 id="page-title" class="text-[18px] font-bold text-gray-900 tracking-tight leading-tight">Захиалга</h1>
      </div>
      <div class="flex items-center gap-3 ml-auto">
        <button onclick="window.print()" class="w-9 h-9 flex items-center justify-center rounded-full bg-blue-50 text-primary hover:bg-blue-100 transition-colors shadow-sm" title="Хэвлэх">
          <span class="material-symbols-outlined text-[20px]">print</span>
        </button>
        <button onclick="toggleSidebar()" class="lg:hidden w-10 h-10 flex items-center justify-center text-gray-800 active:scale-95">
          <span class="material-symbols-outlined text-[24px]">menu</span>
        </button>
      </div>
    </div>
  </header>

  <main class="pt-[84px] px-4 lg:px-8 lg:ml-[260px] max-w-7xl mx-auto space-y-6">
    
    <!-- Loading -->
    <div id="loadingState" class="py-12 text-center text-slate-400">
       <span class="material-symbols-outlined animate-spin text-[40px] mb-2 text-primary">progress_activity</span>
       <p class="text-[14px] font-medium">Мэдээллийг татаж байна...</p>
    </div>

    <!-- Dynamic Content Container -->
    <div id="orderContent" class="space-y-6 hidden"></div>

  </main>

  <!-- Sidebar Overlay -->
  <div id="sidebar-overlay"
    class="fixed inset-0 bg-slate-900/40 z-[60] opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-sm lg:hidden"
    onclick="toggleSidebar()"></div>

  <!-- Sidebar Drawer -->
  <aside id="sidebar-drawer"
    class="fixed top-0 left-0 w-[260px] h-full bg-[#fdfdfd] z-[70] transform -translate-x-full lg:translate-x-0 transition-transform duration-300 lg:shadow-none shadow-2xl flex flex-col border-r border-slate-100">
    <!-- Sidebar Header (Logo) -->
    <div class="h-16 flex items-center px-6 border-b border-transparent lg:border-slate-100/0">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white shadow-sm">
          <span class="material-symbols-outlined text-[18px]">local_shipping</span>
        </div>
        <span class="text-[18px] font-black tracking-tight text-gray-900">LogiFlow</span>
      </div>
      <button onclick="toggleSidebar()" class="lg:hidden ml-auto w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500">
        <span class="material-symbols-outlined text-[18px]">close</span>
      </button>
    </div>
    <!-- Sidebar Links -->
    <div class="flex-1 overflow-y-auto py-6 px-4">
      <ul class="space-y-1">
        <li>
          <a href="admin" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100/50 text-slate-500 hover:text-slate-900 transition-colors font-medium text-[13px]">
            <span class="material-symbols-outlined text-[20px]">dashboard</span> Самбар
          </a>
        </li>
        <li>
          <a href="admin-orders" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-white text-primary font-bold text-[13px] shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-slate-100 justify-between">
            <span class="material-symbols-outlined text-[20px] filled">inventory_2</span> Захиалгууд
          </a>
        </li>
        <li>
          <a href="admin-delivery" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100/50 text-slate-500 hover:text-slate-900 transition-colors font-medium text-[13px]">
             <span class="material-symbols-outlined text-[20px]">local_shipping</span> Монгол хүргэлт
          </a>
        </li>
        <li>
          <a href="admin-containers" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100/50 text-slate-500 hover:text-slate-900 transition-colors font-medium text-[13px]">
            <span class="material-symbols-outlined text-[20px]">view_in_ar</span> Контейнер
          </a>
        </li>
        <li>
          <a href="admin-banners" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100/50 text-slate-500 hover:text-slate-900 transition-colors font-medium text-[13px]">
            <span class="material-symbols-outlined text-[20px]">map</span> Баннер нэмэх
          </a>
        </li>
        <li>
          <a href="admin-notifications" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100/50 text-slate-500 hover:text-slate-900 transition-colors font-medium text-[13px]">
            <span class="material-symbols-outlined text-[20px]">campaign</span> Мэдэгдэл
          </a>
        </li>
        <li class="pt-2">
          <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100/50 text-slate-500 hover:text-slate-900 transition-colors font-medium text-[13px]">
            <span class="material-symbols-outlined text-[20px]">settings</span> Тохиргоо
          </a>
        </li>
      </ul>
    </div>
    <!-- Sidebar Footer Action -->
    <div class="px-4 pb-6 mt-auto">
       <div class="mt-4 flex items-center justify-end px-2">
         <a href="#" onclick="logoutAdmin(event)" class="flex items-center gap-2 text-slate-400 hover:text-red-500 transition-colors text-[12px] font-semibold">
            <span class="material-symbols-outlined text-[18px]">logout</span> Гарах
         </a>
       </div>
    </div>
  </aside>

  <script>
    function toggleSidebar() {
      const overlay = document.getElementById('sidebar-overlay');
      const drawer = document.getElementById('sidebar-drawer');
      if (drawer.classList.contains('-translate-x-full')) {
        drawer.classList.remove('-translate-x-full');
        overlay.classList.remove('opacity-0', 'pointer-events-none');
      } else {
        drawer.classList.add('-translate-x-full');
        overlay.classList.add('opacity-0', 'pointer-events-none');
      }
    }

    const STATUSES = {
       'checking': 'Шалгаж байна',
       'picking_up': 'Хаягаар очиж байна',
       'loaded': 'Контейнерт ачигдлаа',
       'departed': 'Пусанаас хөдөлсөн',
       'in_transit': 'Зам-Үүдэд ирсэн',
       'arrived': 'Монголд ачаа буусан'
    };
    const STATUS_KEYS = Object.keys(STATUSES);
    const EMOJIS = { 1: '📦', 2: '🚚', 3: '🚢' };
    const ICONS = { 1: 'inventory_2', 2: 'local_shipping', 3: 'directions_boat' };

    let currentOrder = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get('id');

      if (!orderId) {
        document.getElementById('loadingState').innerHTML = '<p class="text-[14px] font-medium text-red-400">Захиалгын дугаар олдсонгүй</p>';
        return;
      }

      document.getElementById('page-title').textContent = `Захиалга ${orderId}`;

      try {
        const res = await fetch('/api/orders');
        if (!res.ok) throw new Error('API error');
        const allOrders = await res.json();
        currentOrder = allOrders.find(o => o.order_id === orderId);
      } catch(e) {
        console.error(e);
      }

      document.getElementById('loadingState').classList.add('hidden');
      const content = document.getElementById('orderContent');
      content.classList.remove('hidden');

      if (!currentOrder) {
        content.innerHTML = '<div class="bg-white rounded-3xl p-8 text-center border border-blue-100/50 shadow-card"><p class="text-[14px] text-slate-500 font-medium">Захиалга олдсонгүй</p></div>';
        return;
      }

      const o = currentOrder;
      const typeLabel = o.type === 'standard' ? 'Энгийн ачаа' : 'Экспресс ачаа';
      const d = new Date(o.date);
      const dateString = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

      // Determine current step from container status OR order status
      let currentStep = 1;
      let displayStatus = o.status || 'checking';
      
      const setStepFromStatus = (st) => {
         if (['picking_up'].includes(st)) return 2;
         if (['loaded','departed','in_transit','arrived','delivered'].includes(st)) return 3;
         return 1;
      };
      
      currentStep = setStepFromStatus(displayStatus);

      if (o.container_id) {
        try {
          const cRes = await fetch('/api/containers');
          const containers = await cRes.json();
          const container = containers.find(c => c.id === o.container_id);
          if (container) {
            displayStatus = container.status || displayStatus;
            currentStep = setStepFromStatus(displayStatus);
          }
        } catch(e) {}
      }

      // Images
      let imagesHtml = '';
      if (o.images) {
        let imgs = o.images;
        if (typeof imgs === 'string') { try { imgs = JSON.parse(imgs); } catch(e) { imgs = []; } }
        if (Array.isArray(imgs) && imgs.length > 0) {
          imagesHtml = `
            <div class="pt-2">
              <span class="text-[12px] text-slate-500 font-medium block mb-2">Барааны зураг</span>
              <div class="flex gap-2.5">
                ${imgs.map(img => `<div class="w-16 h-16 bg-white rounded-xl bg-cover bg-center border border-slate-200 shadow-sm" style="background-image: url('${img}');"></div>`).join('')}
              </div>
            </div>`;
        }
      }

      content.innerHTML = `
        <!-- Status Tracker -->
        <div class="bg-white rounded-3xl p-6 border border-blue-100/50 shadow-card animate-fade-in-up">
          <div class="flex justify-between items-start mb-6">
            <div>
              <h2 class="text-[20px] font-extrabold text-gray-900 flex items-center gap-2 mb-1">
                ${STATUSES[STATUS_KEYS[currentStep-1]] || 'Шалгаж байна'} <span class="text-[22px]">${EMOJIS[currentStep]}</span>
              </h2>
              <p class="text-[12px] text-slate-500 font-medium tracking-wide">${o.order_id} • ${dateString}</p>
            </div>
            <div class="bg-primary/10 text-primary px-3 py-1.5 rounded-xl flex flex-col items-center">
              <span class="text-[10px] uppercase font-bold tracking-wider mb-0.5">Төлөв</span>
              <span class="text-[13px] font-bold">Алхам ${currentStep}</span>
            </div>
          </div>
          <div class="flex justify-center mb-8">
            <div class="w-28 h-28 bg-gradient-to-tr from-blue-50 to-blue-100 border-4 border-white rounded-full flex items-center justify-center shadow-sm">
               <span class="material-symbols-outlined text-[56px] text-primary" style="font-variation-settings: 'FILL' 1;">${ICONS[currentStep]}</span>
            </div>
          </div>
          <div class="relative px-2">
            <div class="absolute top-3.5 left-[16.666%] right-[16.666%] h-[4px]">
              <div class="absolute inset-0 bg-slate-100 rounded-full z-0"></div>
              <div class="absolute top-0 left-0 h-full bg-primary rounded-full z-0 transition-all" style="width: ${currentStep === 1 ? '0%' : currentStep === 2 ? '50%' : '100%'}"></div>
            </div>
            <div class="relative z-10 flex justify-between">
              <button onclick="updateOrderStatus('${o.order_id}', 'checking')" class="flex-1 flex flex-col items-center gap-2 outline-none focus:outline-none cursor-pointer group hover:scale-105 transition-transform">
                <div class="w-8 h-8 rounded-full ${currentStep >= 1 ? 'bg-primary' : 'bg-slate-200 group-hover:bg-slate-300'} border-4 border-white shadow-sm transition-colors"></div>
                <span class="text-[11px] ${currentStep >= 1 ? 'font-bold text-primary' : 'font-medium text-slate-400 group-hover:text-slate-500'} text-center leading-[1.3] transition-colors">Шалгаж<br>байна</span>
              </button>
              <button onclick="updateOrderStatus('${o.order_id}', 'picking_up')" class="flex-1 flex flex-col items-center gap-2 outline-none focus:outline-none cursor-pointer group hover:scale-105 transition-transform">
                <div class="w-8 h-8 rounded-full ${currentStep >= 2 ? 'bg-primary' : 'bg-slate-200 group-hover:bg-slate-300'} border-4 border-white shadow-sm transition-colors"></div>
                <span class="text-[11px] ${currentStep >= 2 ? 'font-bold text-primary' : 'font-medium text-slate-400 group-hover:text-slate-500'} text-center leading-[1.3] transition-colors">Хаягаар<br>очиж байна</span>
              </button>
              <button onclick="updateOrderStatus('${o.order_id}', 'loaded')" class="flex-1 flex flex-col items-center gap-2 outline-none focus:outline-none cursor-pointer group hover:scale-105 transition-transform">
                <div class="w-8 h-8 rounded-full ${currentStep >= 3 ? 'bg-primary' : 'bg-slate-200 group-hover:bg-slate-300'} border-4 border-white shadow-sm transition-colors"></div>
                <span class="text-[11px] ${currentStep >= 3 ? 'font-bold text-primary' : 'font-medium text-slate-400 group-hover:text-slate-500'} text-center leading-[1.3] transition-colors">Контейнерт<br>ачигдлаа</span>
              </button>
            </div>
          </div>
        </div>

        <!-- Order Details -->
        <section class="animate-fade-in-up delay-200">
          <h3 class="text-[16px] font-bold text-gray-900 mb-3 px-1">Дэлгэрэнгүй мэдээлэл</h3>
          <div class="bg-white rounded-3xl p-5 md:p-7 border border-blue-100/50 shadow-card">
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

              <!-- General Info & Items -->
              <div class="space-y-4">
                 <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                  <p class="text-[13px] text-slate-400 font-medium tracking-wide">Төрөл</p>
                  <div class="bg-primary/10 px-2.5 py-1 rounded-lg">
                     <p class="text-[13px] font-bold text-primary">${typeLabel}</p>
                  </div>
                </div>
                
                <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                  <p class="text-[13px] text-slate-400 font-medium tracking-wide">Бүртгэсэн огноо</p>
                  <p class="text-[14px] font-bold text-gray-900">${dateString}</p>
                </div>

                <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                  <p class="text-[13px] text-slate-400 font-medium tracking-wide">Салбар</p>
                  <p class="text-[14px] font-bold text-primary flex items-center gap-1">
                     <span class="material-symbols-outlined text-[16px]">storefront</span>
                     ${o.branch || 'Тодорхойгүй'}
                  </p>
                </div>

                <!-- Items -->
                <div class="pt-2">
                  <p class="text-[15px] font-bold text-gray-900 mb-3 flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary text-[20px] bg-primary/10 rounded-full p-1">package</span>
                    Барааны мэдээлэл
                  </p>
                  <div class="bg-surface p-4 rounded-2xl border border-blue-100/50 space-y-3">
                     <div class="flex justify-between items-start">
                       <span class="text-[12px] text-slate-500 font-medium">Барааны төрөл</span>
                       <span class="text-[14px] font-bold text-gray-900">${o.item_category || '-'}</span>
                     </div>
                     <div class="flex justify-between items-start">
                       <span class="text-[12px] text-slate-500 font-medium">Барааны тоо ширхэг</span>
                       <span class="text-[14px] font-bold text-primary px-2 py-0.5 bg-primary/10 rounded-md">${o.item_quantity || '-'} ш</span>
                     </div>
                     ${imagesHtml}
                  </div>
                </div>
              </div>

              <!-- Sender -->
              <div class="border-t border-slate-100 pt-6 md:border-t-0 md:pt-0">
                <p class="text-[15px] font-bold text-gray-900 mb-3 flex items-center gap-2">
                  <span class="material-symbols-outlined text-primary text-[20px] bg-primary/10 rounded-full p-1">person</span>
                  Илгээгчийн мэдээлэл
                </p>
                <div class="bg-surface p-4 rounded-2xl border border-blue-100/50 space-y-3 h-full">
                   <div class="flex justify-between items-start">
                     <span class="text-[12px] text-slate-500 font-medium">Нэр</span>
                     <span class="text-[14px] font-bold text-gray-900">${o.sender_name || '-'}</span>
                   </div>
                   <div class="flex justify-between items-start">
                     <span class="text-[12px] text-slate-500 font-medium">Утасны дугаар</span>
                     <span class="text-[14px] font-bold text-gray-900 tracking-wide">${o.sender_phone || '-'}</span>
                   </div>
                   <div>
                     <span class="text-[12px] text-slate-500 font-medium block mb-1">Хаяг (Солонгос дахь хаяг)</span>
                     <span class="text-[14px] font-semibold text-gray-800 leading-relaxed block">${o.sender_address || '-'}</span>
                   </div>
                </div>
              </div>

              <!-- Receiver -->
              <div class="border-t border-slate-100 pt-6 md:border-t-0 md:pt-0">
                <p class="text-[15px] font-bold text-gray-900 mb-3 flex items-center gap-2">
                  <span class="material-symbols-outlined text-primary text-[20px] bg-primary/10 rounded-full p-1">location_on</span>
                  Хүлээн авагчийн мэдээлэл
                </p>
                <div class="bg-surface p-4 rounded-2xl border border-blue-100/50 space-y-3 h-full">
                   <div class="flex justify-between items-start">
                     <span class="text-[12px] text-slate-500 font-medium">Нэр</span>
                     <span class="text-[14px] font-bold text-gray-900">${o.receiver_name || '-'}</span>
                   </div>
                   <div class="flex justify-between items-start">
                     <span class="text-[12px] text-slate-500 font-medium">Утасны дугаар</span>
                     <span class="text-[14px] font-bold text-gray-900 tracking-wide">${o.receiver_phone || '-'}</span>
                   </div>
                   <div>
                     <span class="text-[12px] text-slate-500 font-medium block mb-1">Хаяг (Монгол хаяг)</span>
                     <span class="text-[14px] font-semibold text-gray-800 leading-relaxed block">${o.receiver_address || '-'}</span>
                   </div>
                </div>
              </div>

            </div>
          </div>
        </section>

        <!-- Actions -->
         <div class="flex gap-3 pb-8 animate-fade-in-up delay-200 mt-6 flex-wrap">
            <a href="admin-orders" class="w-[full] sm:w-auto flex-1 p-4 bg-slate-100 border border-slate-200 shadow-sm text-slate-700 font-bold rounded-2xl flex items-center justify-center gap-2 hover:bg-slate-200 active:scale-[0.98] transition-all">
              <span class="material-symbols-outlined text-[20px]">arrow_back</span> Буцах
            </a>
            <button onclick="window.print()" class="flex-1 p-4 bg-white border border-blue-100 shadow-sm text-primary font-bold rounded-2xl flex flex-col items-center justify-center gap-1 hover:bg-slate-50 active:scale-[0.98] transition-all">
              <span class="material-symbols-outlined text-[20px]">print</span> Хэвлэх
            </button>
            <a href="tel:${o.sender_phone || o.receiver_phone || ''}" class="flex-1 p-4 bg-white border border-blue-100 shadow-sm text-slate-700 font-bold rounded-2xl flex flex-col items-center justify-center gap-1 hover:bg-slate-50 active:scale-[0.98] transition-all">
              <span class="material-symbols-outlined text-[20px]">call</span> Залгах
            </a>
            <button onclick="deleteThisOrder('${o.order_id}')" class="flex-1 p-4 bg-red-50 border border-red-100/50 shadow-sm text-red-500 font-bold rounded-2xl flex flex-col items-center justify-center gap-1 hover:bg-red-100 active:scale-[0.98] transition-all">
              <span class="material-symbols-outlined text-[20px]">delete</span> Устгах
            </button>
         </div>
      `;
    });

    window.updateOrderStatus = async function(orderId, newStatus) {
       try {
         const res = await fetch('/api/orders', {
             method: 'PUT',
             headers: {'Content-Type': 'application/json'},
             body: JSON.stringify({ orderId: orderId, status: newStatus })
         });
         if (res.ok) {
            window.location.reload();
         } else {
            alert('Төлөв өөрчлөх үед алдаа гарлаа');
         }
       } catch(e) {
            alert('Холболтын алдаа: ' + e.message);
       }
    };

    window.deleteThisOrder = async function(orderId) {
       if (!confirm('Захиалга "' + orderId + '" устгахдаа итгэлтэй байна уу?')) return;
       try {
         const res = await fetch('/api/orders?id=' + orderId, { method: 'DELETE' });
         if (res.ok) {
            window.location.href = 'admin-orders';
         } else {
            alert('Устгахад алдаа гарлаа');
         }
       } catch(e) {
         alert('Холболтын алдаа: ' + e.message);
       }
    };
  </script>
</body>
</html>
