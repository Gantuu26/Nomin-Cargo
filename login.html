<!DOCTYPE html>
<html lang="mn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Номин Транс - Нэвтрэх / Бүртгүүлэх</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
             "primary": "#3B82F6",
             "primary-dark": "#2563EB",
             "primary-light": "#DBEAFE",
             "primary-container": "#3B82F6",
             "on-primary": "#ffffff",
             "on-primary-container": "#DBEAFE",
             "secondary": "#6366F1",
             "secondary-container": "#C7D2FE",
             "on-secondary": "#ffffff",
             "error": "#EF4444",
             "error-container": "#FEE2E2",
             "surface": "#F0F4FF",
             "surface-card": "#ffffff",
             "surface-container": "#E8EDFB",
             "surface-container-high": "#DCE3F5",
             "surface-variant": "#E2E8F0",
             "on-surface": "#0F172A",
             "on-surface-variant": "#64748B",
             "outline": "#94A3B8",
             "outline-variant": "#CBD5E1",
             "background": "#F0F4FF",
          },
          fontFamily: {
             "sans": ["Inter", "system-ui", "sans-serif"],
          },
          boxShadow: {
             "card": "0 4px 20px -2px rgba(59, 130, 246, 0.08), 0 0 2px rgba(59, 130, 246, 0.05)",
             "glass": "0 8px 32px 0 rgba(31, 38, 135, 0.07)",
             "soft": "0 10px 40px -10px rgba(59,130,246,0.15)",
             "google": "0 2px 4px 0 rgba(0,0,0,.25)"
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #F0F4FF;
      color: #0F172A;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    
    .bg-gradient-primary {
      background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
    }

    /* Pattern overlay */
    .bg-pattern {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233b82f6' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    input:focus::placeholder {
      opacity: 0.5;
    }

    /* Tab transitions */
    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease-in-out;
    }
    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <script src="alert.js"></script>
</head>

<body class="min-h-screen bg-surface bg-pattern flex flex-col relative">
  
  <!-- Decorative background elements -->
  <div class="absolute top-[-10%] right-[-10%] w-[300px] h-[300px] rounded-full bg-primary/20 blur-[80px] pointer-events-none"></div>
  <div class="absolute bottom-[-10%] left-[-10%] w-[300px] h-[300px] rounded-full bg-secondary/20 blur-[80px] pointer-events-none"></div>

  <!-- Header / Navigation -->
  <header class="flex items-center justify-between px-5 py-4 z-10">
    <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white shadow-sm text-slate-600 hover:bg-slate-50 transition-colors active:scale-95">
      <span class="material-symbols-outlined text-[22px]">arrow_back_ios_new</span>
    </button>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col justify-center px-6 pb-12 z-10 max-w-md w-full mx-auto relative mt-[-20px]">
    
    <!-- Branding -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-primary text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-soft">
        <span class="material-symbols-outlined text-[32px]">local_shipping</span>
      </div>
      <h1 class="text-[24px] font-extrabold text-on-surface mb-1">Тавтай морилно уу!</h1>
      <p class="text-[14px] text-on-surface-variant font-medium">Номин Транс КАРГО</p>
    </div>

    <!-- Login/Register Card -->
    <div class="glass-card rounded-[28px] p-6 shadow-soft relative overflow-hidden">
      
      <!-- Tabs -->
      <div class="flex p-1 bg-slate-100 rounded-2xl mb-6 relative">
        <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2.5 text-[14px] font-bold text-primary bg-white rounded-xl shadow-sm transition-all z-10">Нэвтрэх</button>
        <button id="tab-register" onclick="switchTab('register')" class="flex-1 py-2.5 text-[14px] font-bold text-slate-500 rounded-xl transition-all z-10 hover:text-slate-700">Бүртгүүлэх</button>
      </div>

      <!-- Login Form section -->
      <div id="login-form" class="tab-content active">
        <form onsubmit="handleLogin(event)">
          <div class="space-y-4 mb-2">
            <!-- Email -->
            <div class="relative">
              <input type="email" id="login-email" placeholder="Цахим хаяг" required class="w-full bg-slate-50 border border-slate-200 text-slate-900 text-[14px] rounded-2xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 font-medium">
            </div>
            <!-- Password -->
            <div class="relative">
              <input type="password" id="login-password" placeholder="Нууц үг" required class="w-full bg-slate-50 border border-slate-200 text-slate-900 text-[14px] rounded-2xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 font-medium">
              <button type="button" onclick="togglePassword('login-password')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 focus:outline-none h-6 w-6">
                 <span class="material-symbols-outlined text-[20px]">visibility_off</span>
              </button>
            </div>
          </div>
          <div class="flex justify-end mb-6 mt-2">
            <a href="#" class="text-[12px] font-semibold text-primary hover:underline">Нууц үгээ мартсан уу?</a>
          </div>
          <button type="submit" class="w-full bg-gradient-primary text-white font-bold text-[15px] py-3.5 rounded-2xl shadow-soft hover:shadow-lg transition-all active:scale-[0.98]">
            Нэвтрэх
          </button>
        </form>
      </div>

      <!-- Register Form section -->
      <div id="register-form" class="tab-content">
        <form onsubmit="handleRegister(event)">
          <div class="space-y-4 mb-6">
            <!-- Name -->
            <div class="relative">
              <input type="text" id="reg-name" placeholder="Нэр" required class="w-full bg-slate-50 border border-slate-200 text-slate-900 text-[14px] rounded-2xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 font-medium">
            </div>
             <!-- Phone -->
             <div class="relative">
              <input type="tel" id="reg-phone" placeholder="Утасны дугаар" required class="w-full bg-slate-50 border border-slate-200 text-slate-900 text-[14px] rounded-2xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 font-medium">
            </div>
            <!-- Email -->
            <div class="relative">
              <input type="email" id="reg-email" placeholder="Цахим хаяг" required class="w-full bg-slate-50 border border-slate-200 text-slate-900 text-[14px] rounded-2xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 font-medium">
            </div>
            <!-- Password -->
            <div class="relative">
              <input type="password" id="reg-password" placeholder="Нууц үг" required class="w-full bg-slate-50 border border-slate-200 text-slate-900 text-[14px] rounded-2xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 font-medium">
              <button type="button" onclick="togglePassword('reg-password')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 focus:outline-none h-6 w-6">
                 <span class="material-symbols-outlined text-[20px]">visibility_off</span>
              </button>
            </div>
          </div>
          <button type="submit" class="w-full bg-gradient-primary text-white font-bold text-[15px] py-3.5 rounded-2xl shadow-soft hover:shadow-lg transition-all active:scale-[0.98]">
            Бүртгүүлэх
          </button>
        </form>
      </div>

      <!-- Divider -->
      <div class="relative flex items-center justify-center my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-slate-200"></div>
        </div>
        <div class="relative px-4 bg-white text-[11px] font-bold text-slate-400 uppercase tracking-widest rounded-full">Эсвэл</div>
      </div>

      <!-- Google Sign In -->
      <div id="g_id_onload"
        data-client_id="729057953866-odme24trj9dudep2g8qop97l61ss1fsv.apps.googleusercontent.com"
        data-callback="handleGoogleCredential"
        data-auto_prompt="false">
      </div>
      <button onclick="triggerGoogleLogin()" class="w-full bg-white border border-slate-200 text-slate-700 font-bold text-[15px] py-3.5 rounded-2xl shadow-sm hover:shadow-md hover:bg-slate-50 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="w-5 h-5">
           <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
           <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
           <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
           <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
        </svg>
        Google-ээр нэвтрэх
      </button>

      <p class="text-[11px] text-center text-slate-400 mt-6 leading-relaxed">
        Та нэвтэрснээр манай <br><a href="terms" class="underline hover:text-primary">Үйлчилгээний нөхцөл</a> болон <a href="privacy" class="underline hover:text-primary">Нууцлалын бодлогыг</a> зөвшөөрч байгаа болно.
      </p>

    </div>
  </main>

  <script>
    function switchTab(tab) {
      const loginBtn = document.getElementById('tab-login');
      const regBtn = document.getElementById('tab-register');
      const loginForm = document.getElementById('login-form');
      const regForm = document.getElementById('register-form');

      if (tab === 'login') {
        // Active Button styling
        loginBtn.className = "flex-1 py-2.5 text-[14px] font-bold text-primary bg-white rounded-xl shadow-sm transition-all z-10";
        regBtn.className = "flex-1 py-2.5 text-[14px] font-bold text-slate-500 rounded-xl transition-all z-10 hover:text-slate-700";
        
        loginForm.classList.add('active');
        regForm.classList.remove('active');
      } else {
        regBtn.className = "flex-1 py-2.5 text-[14px] font-bold text-primary bg-white rounded-xl shadow-sm transition-all z-10";
        loginBtn.className = "flex-1 py-2.5 text-[14px] font-bold text-slate-500 rounded-xl transition-all z-10 hover:text-slate-700";
        
        regForm.classList.add('active');
        loginForm.classList.remove('active');
      }
    }

    function togglePassword(inputId) {
      const input = document.getElementById(inputId);
      const icon = input.parentElement.querySelector('.material-symbols-outlined');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility_off';
      }
    }

    // Decode JWT token from Google
    function decodeJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
      return JSON.parse(jsonPayload);
    }

    // Trigger Google One Tap or redirect flow
    function triggerGoogleLogin() {
      google.accounts.id.initialize({
        client_id: '729057953866-odme24trj9dudep2g8qop97l61ss1fsv.apps.googleusercontent.com',
        callback: handleGoogleCredential
      });
      google.accounts.id.prompt();
    }

    // Google credential callback
    async function handleGoogleCredential(response) {
      try {
        const payload = decodeJwt(response.credential);
        const user = {
          id: 'google_' + payload.sub,
          name: payload.name,
          email: payload.email,
          phone: '',
          picture: payload.picture
        };

        // Save session
        localStorage.setItem('nomin_user', JSON.stringify(user));

        // Also register in our DB (ignore if already exists)
        try {
          await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: user.name,
              email: user.email,
              phone: 'google',
              password: 'google_oauth_' + payload.sub
            })
          });
        } catch(e) { /* ignore duplicate */ }

        window.location.href = './';
      } catch (err) {
        showCustomAlert('Гоогл нэвтрэх алдаа: ' + err.message, null, true);
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const submitBtn = e.target.querySelector('button[type="submit"]');

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Уншиж байна...';

        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if (data.success) {
          localStorage.setItem('nomin_user', JSON.stringify(data.user));
          window.location.href = './';
        } else {
          showCustomAlert('Алдаа: ' + data.error, null, true);
        }
      } catch (err) {
        showCustomAlert('Холболтын алдаа гарлаа.', null, true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Нэвтрэх';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('reg-name').value;
      const phone = document.getElementById('reg-phone').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const submitBtn = e.target.querySelector('button[type="submit"]');

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Уншиж байна...';

        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, email, password })
        });

        const data = await res.json();
        if (data.success) {
          showCustomAlert('Бүртгэл амжилттай! Та одоо нэвтэрч орно уу.', () => {
            switchTab('login');
            document.getElementById('login-email').value = email;
          });
        } else {
          showCustomAlert('Алдаа: ' + data.error, null, true);
        }
      } catch (err) {
        showCustomAlert('Холболтын алдаа гарлаа.', null, true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Бүртгүүлэх';
      }
    }
  </script>
</body>

</html>
