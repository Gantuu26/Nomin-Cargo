<!DOCTYPE html>
<html lang="mn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Монгол хүргэлт - Админ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#3B82F6",
            "primary-dark": "#2563EB",
            "success": "#10B981",    
            "warning": "#F59E0B",    
            "info": "#3B82F6",       
            "surface": "#F0F4FF",
            "on-surface": "#0F172A",
          },
          fontFamily: {
            "body": ["Inter", "system-ui", "sans-serif"],
          },
          boxShadow: {
            "card": "0 1px 3px rgba(15, 23, 42, 0.04), 0 4px 12px rgba(15, 23, 42, 0.04)",
            "nav": "0 -1px 12px rgba(15, 23, 42, 0.06)",
            "btn": "0 4px 14px rgba(59, 130, 246, 0.35)",
          }
        },
      },
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #F0F4FF; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .header-blur { background: linear-gradient(180deg, rgba(240, 244, 255, 0.97) 0%, rgba(240, 244, 255, 0.92) 100%); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .nav-glass { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    .animate-fade-in { animation: fadeIn 0.25s ease-in-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .delay-100 { animation-delay: 0.1s; opacity: 0; }
  </style>
  <link rel="stylesheet" href="styles.css">
  <script>
    if (document.fonts) {
      document.fonts.ready.then(() => { document.documentElement.classList.add('fonts-loaded'); });
    } else {
      window.addEventListener('load', () => { document.documentElement.classList.add('fonts-loaded'); });
    }
    if (!localStorage.getItem('admin_session')) {
      window.location.href = 'admin-login';
    }
    function logoutAdmin(e) {
      if(e) e.preventDefault();
      localStorage.removeItem('admin_session');
      window.location.href = 'admin-login';
    }
  </script>
</head>

<body class="bg-[#F0F4FF] text-[#0F172A] min-h-screen pb-32">
  
  <!-- Admin Header -->
  <header class="fixed top-0 w-full lg:w-[calc(100%-260px)] lg:ml-[260px] z-50 bg-white/90 backdrop-blur-md border-b border-slate-100">
    <div class="flex items-center justify-between px-5 py-3 lg:px-8 mx-auto h-16">
      <div class="lg:hidden">
        <h1 class="text-[18px] font-bold text-gray-900 tracking-tight leading-tight">Монгол хүргэлт</h1>
      </div>
      <div class="hidden lg:flex items-center relative w-full max-w-md">
         <span class="material-symbols-outlined absolute left-3 text-slate-400 text-[20px]">search</span>
         <input type="text" placeholder="Захиалга хайх..." class="w-full bg-slate-50 text-slate-700 text-[13px] rounded-full pl-10 pr-4 py-2 outline-none focus:ring-1 focus:ring-slate-200">
      </div>
      <div class="flex items-center gap-3 lg:gap-5 ml-auto">
        <button onclick="toggleSidebar()" class="lg:hidden w-10 h-10 flex items-center justify-center text-gray-800 active:scale-95">
          <span class="material-symbols-outlined text-[24px]">menu</span>
        </button>
      </div>
    </div>
  </header>

  <main class="pt-[84px] px-4 lg:px-8 lg:ml-[260px] max-w-7xl mx-auto space-y-4">
    
    <!-- Top Action Bar (Desktop only) -->
    <div class="hidden lg:flex justify-between items-end mb-4">
       <div>
         <h1 class="text-[24px] font-bold text-gray-900">Монгол хүргэлт</h1>
       </div>
    </div>

    <!-- Filters Bar -->
    <div class="bg-white rounded-2xl border border-slate-200 p-2 lg:p-3 mb-4 flex flex-wrap gap-3 items-center shadow-sm">
      <div class="flex-1 min-w-[200px] relative">
         <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[18px]">search</span>
         <input type="text" id="searchInput" placeholder="Хайх (Утас, Нэр, ID)..." onkeyup="renderDeliveryOrders()" class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl pl-9 pr-3 py-2.5 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
      </div>
      <div class="w-[160px]">
         <select id="statusFilter" onchange="renderDeliveryOrders()" class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl px-3 py-2.5 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-slate-700 font-medium cursor-pointer">
            <option value="all" selected>Бүгд</option>
            <option value="arrived">Монголд буусан</option>
            <option value="delivered">Олгогдсон</option>
         </select>
      </div>
      <button onclick="loadDeliveryData()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-primary transition-colors active:scale-95">
         <span class="material-symbols-outlined text-[20px]">refresh</span>
      </button>
    </div>
    
    <!-- Orders Card Grid -->
    <div id="delivery-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-10">
       <!-- Dynamic delivery cards will appear here -->
    </div>

  </main>

  <!-- Sidebar Overlay -->
  <div id="sidebar-overlay"
    class="fixed inset-0 bg-slate-900/40 z-[60] opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-sm lg:hidden"
    onclick="toggleSidebar()"></div>

  <!-- Sidebar Drawer -->
  <aside id="sidebar-drawer"
    class="fixed top-0 left-0 w-[260px] h-full bg-[#fdfdfd] z-[70] transform -translate-x-full lg:translate-x-0 transition-transform duration-300 lg:shadow-none shadow-2xl flex flex-col border-r border-slate-100">
    <div class="h-16 flex items-center px-6 border-b border-transparent lg:border-slate-100/0">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white shadow-sm">
          <span class="material-symbols-outlined text-[18px]">local_shipping</span>
        </div>
        <span class="text-[18px] font-black tracking-tight text-gray-900">LogiFlow</span>
      </div>
      <button onclick="toggleSidebar()" class="lg:hidden ml-auto w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500">
        <span class="material-symbols-outlined text-[18px]">close</span>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto py-6 px-4">
      <ul class="space-y-1">
        <li><a href="admin" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100/50 text-slate-500 hover:text-slate-900 transition-colors font-medium text-[13px]"><span class="material-symbols-outlined text-[20px]">dashboard</span> Самбар</a></li>
        <li><a href="admin-orders" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100/50 text-slate-500 hover:text-slate-900 transition-colors font-medium text-[13px]"><span class="material-symbols-outlined text-[20px]">inventory_2</span> Захиалгууд</a></li>
        <li><a href="admin-delivery" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-white text-primary font-bold text-[13px] shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-slate-100"><div class="flex items-center gap-3"><span class="material-symbols-outlined text-[20px] filled">local_shipping</span> Монгол хүргэлт</div></a></li>
        <li><a href="admin-containers" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100/50 text-slate-500 hover:text-slate-900 transition-colors font-medium text-[13px]"><span class="material-symbols-outlined text-[20px]">view_in_ar</span> Контейнер</a></li>
        <li><a href="admin-banners" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100/50 text-slate-500 hover:text-slate-900 transition-colors font-medium text-[13px]"><span class="material-symbols-outlined text-[20px]">map</span> Баннер нэмэх</a></li>
        <li><a href="admin-notifications" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100/50 text-slate-500 hover:text-slate-900 transition-colors font-medium text-[13px]"><span class="material-symbols-outlined text-[20px]">campaign</span> Мэдэгдэл</a></li>
        <li class="pt-2"><a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100/50 text-slate-500 hover:text-slate-900 transition-colors font-medium text-[13px]"><span class="material-symbols-outlined text-[20px]">settings</span> Тохиргоо</a></li>
      </ul>
    </div>
    <div class="px-4 pb-6 mt-auto">
       <div class="mt-4 flex items-center justify-end px-2">
         <a href="#" onclick="logoutAdmin(event)" class="flex items-center gap-2 text-slate-400 hover:text-red-500 transition-colors text-[12px] font-semibold">
            <span class="material-symbols-outlined text-[18px]">logout</span> Гарах
         </a>
       </div>
    </div>
  </aside>

  <script>
    let allOrders = [];
    let allContainers = [];

    const STATUSES = {
       'checking': 'Шалгаж байна',
       'picking_up': 'Хаягаар очиж байна',
       'loaded': 'Контейнерт ачигдлаа',
       'departed': 'Пусанаас хөдөлсөн',
       'in_transit': 'Зам-Үүдэд ирсэн',
       'arrived': 'Монголд ачаа буусан'
    };

    async function loadDeliveryData() {
        const list = document.getElementById('delivery-list');
        list.innerHTML = `<div class="col-span-full py-10 text-center text-slate-400 flex flex-col items-center"><span class="material-symbols-outlined animate-spin text-[32px] text-primary mb-2">progress_activity</span>Ачаалж байна...</div>`;
        
        try {
            const [oRes, cRes] = await Promise.all([ fetch('/api/orders'), fetch('/api/containers') ]);
            allOrders = await oRes.json();
            allContainers = await cRes.json();
        } catch(e) { 
            console.error(e); 
            list.innerHTML = `<div class="col-span-full py-10 text-center text-red-400">Алдаа гарлаа. Дахин оролдоно уу.</div>`;
            return;
        }
        renderDeliveryOrders();
    }

    function renderDeliveryOrders() {
        const list = document.getElementById('delivery-list');
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        const statFilter = document.getElementById('statusFilter').value;

        const filteredOrders = allOrders.filter(o => {
            let effectiveStatus = o.status || 'checking';
            if (o.status === 'delivered') {
               effectiveStatus = 'delivered';
            } else if (o.container_id) {
               const c = allContainers.find(x => x.id === o.container_id);
               if (c) effectiveStatus = c.status || effectiveStatus;
            }

            if (statFilter === 'arrived' && effectiveStatus !== 'arrived') return false;
            if (statFilter === 'delivered' && effectiveStatus !== 'delivered') return false;

            if (q) {
               if (!((o.order_id && o.order_id.toLowerCase().includes(q)) ||
                     (o.receiver_name && o.receiver_name.toLowerCase().includes(q)) ||
                     (o.receiver_phone && o.receiver_phone.includes(q)) ||
                     (o.sender_name && o.sender_name.toLowerCase().includes(q)))) {
                   return false;
               }
            }
            return true;
        });

        if (filteredOrders.length === 0) {
           list.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400 text-[14px] font-medium border-2 border-dashed border-slate-200 rounded-3xl animate-fade-in-up">Тохирох захиалга алга байна</div>`;
           return;
        }

        let html = '';
        filteredOrders.forEach(order => {
          const t = new Date(order.date);
          const formattedDate = `${t.getFullYear()}.${String(t.getMonth() + 1).padStart(2, '0')}.${String(t.getDate()).padStart(2, '0')} ${String(t.getHours()).padStart(2, '0')}:${String(t.getMinutes()).padStart(2, '0')}`;
          const typeLabel = order.type === 'standard' ? 'Энгийн ачаа' : 'Экспресс ачаа';
          
          // Container label + status
          let containerLabel = '';
          let containerStatusLabel = '';
          if (order.container_id) {
             const c = allContainers.find(x => x.id === order.container_id);
             if (c) {
                const sName = STATUSES[c.status] || 'Шалгаж байна';
                containerLabel = `<span class="w-1 h-1 rounded-full bg-slate-300"></span><span class="bg-blue-600 text-white px-2 py-0.5 rounded-md normal-case tracking-normal text-[10px] font-bold">${c.name}</span>`;
                containerStatusLabel = `<span class="w-1 h-1 rounded-full bg-slate-300"></span><span class="bg-emerald-600 text-white px-2 py-0.5 rounded-md normal-case tracking-normal text-[10px] font-bold">${sName}</span>`;
             }
          }

          const isDelivered = order.status === 'delivered';
          const orderId = order.order_id || 'Тодорхойгүй';
          const sName = order.sender_name || 'Тодорхойгүй';
          const sPhone = order.sender_phone || '';
          const sAddress = order.sender_address || '';
          const rName = order.receiver_name || 'Тодорхойгүй';
          const rPhone = order.receiver_phone || '';
          const rAddress = order.receiver_address || '';
          const iCat = order.item_category || 'Бусад';
          const iQty = order.item_quantity || 1;

          html += `
          <div class="bg-white rounded-3xl p-5 border border-blue-100/50 shadow-card relative animate-fade-in-up">
            <div class="mb-3 border-b border-slate-100 pb-3">
              <div class="flex items-center flex-wrap gap-2 mb-2 text-[11px] font-bold uppercase tracking-wide">
                <span class="text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md">${order.branch || '-'}</span>
                <span class="w-1 h-1 rounded-full bg-slate-300"></span>
                <span class="text-primary bg-primary/10 px-2 py-0.5 rounded-md normal-case tracking-normal">${typeLabel}</span>
                ${containerLabel}
                ${containerStatusLabel}
              </div>
              <h3 class="text-[18px] font-bold text-gray-900 leading-tight mb-0.5">${orderId}</h3>
              <p class="text-[12px] text-slate-400 font-medium tracking-wide">${formattedDate}</p>
            </div>
            
            <!-- Tabs UI -->
            <div class="flex gap-2 border-b border-slate-100 mt-2 relative z-10 w-full overflow-x-auto no-scrollbar">
               <button onclick="switchTab('${orderId}', 'sender')" id="${orderId}-tab-sender" class="${orderId}-tab flex-1 whitespace-nowrap min-w-max pb-2.5 border-b-2 border-primary text-primary font-bold text-[13px] transition-colors focus:outline-none">Илгээгч</button>
               <button onclick="switchTab('${orderId}', 'goods')" id="${orderId}-tab-goods" class="${orderId}-tab flex-1 whitespace-nowrap min-w-max pb-2.5 border-b-2 border-transparent text-slate-400 font-bold text-[13px] transition-colors focus:outline-none">Бараа</button>
               <button onclick="switchTab('${orderId}', 'receiver')" id="${orderId}-tab-receiver" class="${orderId}-tab flex-1 whitespace-nowrap min-w-max pb-2.5 border-b-2 border-transparent text-slate-400 font-bold text-[13px] transition-colors focus:outline-none">Хүлээн авагч</button>
            </div>

            <!-- Tab Contents -->
            <div class="bg-surface-container-low p-4 rounded-2xl border border-blue-100/50 mb-4 min-h-[125px] mt-4">
               <div id="${orderId}-content-sender" class="${orderId}-content block animate-fade-in">
                 <div class="flex flex-wrap justify-between items-start gap-y-3 mb-3">
                   <div class="w-1/2 pr-2">
                     <span class="text-[11px] text-slate-400 font-medium block mb-0.5">Нэр</span>
                     <span class="text-[14px] font-bold text-gray-900 line-clamp-1">${sName}</span>
                   </div>
                   <div class="w-1/2 pl-1">
                     <span class="text-[11px] text-slate-400 font-medium block mb-0.5">Утасны дугаар</span>
                     <span class="text-[14px] font-bold text-gray-900">${sPhone}</span>
                   </div>
                 </div>
                 <div>
                   <span class="text-[11px] text-slate-400 font-medium block mb-0.5">Хаяг</span>
                   <span class="text-[13px] font-semibold text-gray-800 leading-relaxed block">${sAddress}</span>
                 </div>
               </div>
               <div id="${orderId}-content-goods" class="${orderId}-content hidden animate-fade-in">
                 <div class="flex flex-wrap justify-between items-start gap-y-3 mb-4">
                   <div class="w-1/2">
                     <span class="text-[11px] text-slate-400 font-medium block mb-0.5">Барааны төрөл</span>
                     <span class="text-[14px] font-bold text-gray-900 leading-tight block">${iCat}</span>
                   </div>
                   <div class="w-1/2">
                     <span class="text-[11px] text-slate-400 font-medium block mb-0.5">Тоо ширхэг</span>
                     <div class="inline-block px-2.5 py-1 rounded-lg bg-primary/10 text-primary font-bold text-[12px]">${iQty} хайрцаг/ш</div>
                   </div>
                  ${(() => { try { const li = JSON.parse(order.large_items || '[]'); return li.length > 0 ? `<div class="mt-3"><span class="text-[11px] text-slate-400 font-medium block mb-1">Том оврын ачаа</span><div class="flex flex-wrap gap-1">${li.map(x => `<span class="text-[11px] font-bold text-orange-700 bg-orange-50 border border-orange-200 px-2 py-0.5 rounded-md">${x}</span>`).join('')}</div></div>` : ''; } catch(e) { return ''; } })()}
                 </div>
               </div>
               <div id="${orderId}-content-receiver" class="${orderId}-content hidden animate-fade-in">
                 <div class="flex flex-wrap justify-between items-start gap-y-3 mb-3">
                   <div class="w-1/2 pr-2">
                     <span class="text-[11px] text-slate-400 font-medium block mb-0.5">Нэр</span>
                     <span class="text-[14px] font-bold text-gray-900 line-clamp-1">${rName}</span>
                   </div>
                   <div class="w-1/2 pl-1">
                     <span class="text-[11px] text-slate-400 font-medium block mb-0.5">Утасны дугаар</span>
                     <span class="text-[14px] font-bold text-gray-900">${rPhone}</span>
                   </div>
                 </div>
                 <div>
                   <span class="text-[11px] text-slate-400 font-medium block mb-0.5">Хаяг (Монгол хаяг)</span>
                   <span class="text-[13px] font-semibold text-gray-800 leading-relaxed block">${rAddress}</span>
                 </div>
               </div>
            </div>

            <!-- Status Change + Actions -->
            <div class="flex gap-2 mt-2">
              <div class="flex-1">
                 <select onchange="updateOrderStatus('${orderId}', this.value)" class="w-full h-full appearance-none bg-white border border-slate-200 text-gray-700 text-[12px] font-bold rounded-2xl pl-3 pr-8 py-3 outline-none focus:border-primary transition-colors cursor-pointer">
                    <option value="checking" ${!isDelivered ? 'selected' : ''}>Салбарт ирсэн</option>
                    <option value="delivered" ${isDelivered ? 'selected' : ''}>Олгогдсон</option>
                 </select>
              </div>
              <a href="tel:${rPhone}" class="flex-1 py-3 rounded-2xl border border-slate-200 bg-white text-gray-700 active:scale-[0.98] transition-all hover:bg-slate-50 flex flex-col items-center justify-center">
                <div class="flex items-center gap-1.5 text-[12px] font-bold mb-0.5">
                  <span class="material-symbols-outlined text-[16px]">phone</span>
                  Залгах
                </div>
                <span class="text-[10px] text-slate-400 font-semibold tracking-wide">${rPhone}</span>
              </a>
              <a href="admin-order-detail?id=${orderId}" class="flex-1 py-3 rounded-2xl border border-slate-200 bg-white text-gray-700 active:scale-[0.98] hover:bg-slate-50 transition-all flex items-center justify-center">
                <span class="material-symbols-outlined text-[16px]">edit_note</span>
              </a>
            </div>
          </div>
          `;
        });
        list.innerHTML = html;
    }

    function switchTab(orderId, tab) {
       document.querySelectorAll('.' + orderId + '-tab').forEach(btn => {
          btn.classList.remove('border-primary', 'text-primary');
          btn.classList.add('border-transparent', 'text-slate-400');
       });
       document.querySelectorAll('.' + orderId + '-content').forEach(div => {
          div.classList.add('hidden');
          div.classList.remove('block');
       });
       document.getElementById(orderId + '-tab-' + tab).classList.remove('border-transparent', 'text-slate-400');
       document.getElementById(orderId + '-tab-' + tab).classList.add('border-primary', 'text-primary');
       document.getElementById(orderId + '-content-' + tab).classList.remove('hidden');
       document.getElementById(orderId + '-content-' + tab).classList.add('block');
    }

    async function updateOrderStatus(orderId, newStatus) {
       try {
           const res = await fetch('/api/orders', {
               method: 'PUT',
               headers: {'Content-Type': 'application/json'},
               body: JSON.stringify({ orderId: orderId, status: newStatus })
           });
           if (res.ok) {
              loadDeliveryData(); 
           } else {
              alert('Төлөв шинэчлэхэд алдаа гарлаа');
           }
       } catch (e) {
           alert('Алдаа: ' + e.message);
       }
    }

    function toggleSidebar() {
      const overlay = document.getElementById('sidebar-overlay');
      const drawer = document.getElementById('sidebar-drawer');
      if (drawer.classList.contains('-translate-x-full')) {
        drawer.classList.remove('-translate-x-full');
        overlay.classList.remove('opacity-0', 'pointer-events-none');
      } else {
        drawer.classList.add('-translate-x-full');
        overlay.classList.add('opacity-0', 'pointer-events-none');
      }
    }

    document.addEventListener("DOMContentLoaded", loadDeliveryData);
  </script>
</body>
</html>
